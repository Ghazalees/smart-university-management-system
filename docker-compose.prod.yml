# Orchestrates the backend, frontend, AI service, gateway, storage, and private network.

name: smart-university-production

services:
  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SQLITE_DB_PATH: /app/data/db.sqlite3
      AI_SERVICE_URL: http://ai-service:9000
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:?Set AI_SERVICE_API_KEY}
      AI_RETRIEVAL_STRATEGY: ${AI_RETRIEVAL_STRATEGY:-hybrid}
      AUTO_MIGRATE: "1"
      AUTO_SEED_SYSTEM: "1"
      AUTO_SEED_DEMO: "0"
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-1}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-1}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-0}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
    read_only: true
    tmpfs: [/tmp]
    volumes:
      - backend-data:/app/data
      - backend-static:/app/staticfiles
    expose: ["8000"]
    depends_on:
      ai-service:
        condition: service_healthy
    restart: always
    networks: [private]

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE}
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run]
    expose: ["8080"]
    restart: always
    networks: [private]

  ai-service:
    image: ${AI_IMAGE:?Set AI_IMAGE}
    environment:
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:?Set AI_SERVICE_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      AI_DISABLE_DOCS: "1"
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    read_only: true
    tmpfs: [/tmp]
    expose: ["9000"]
    restart: always
    networks: [private]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run]
    restart: always
    networks: [private]

volumes:
  backend-data:
  backend-static:

networks:
  private:
    driver: bridge
