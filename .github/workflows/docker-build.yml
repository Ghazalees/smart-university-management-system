name: Docker Build

on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'ai-service/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'ai-service/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare backend environment file
        run: cp backend/.env.example backend/.env

      - name: Validate compose file
        run: docker compose config

      - name: Build frontend image
        run: docker build -t smart-university-frontend ./frontend

      - name: Build backend image
        run: docker build -t smart-university-backend ./backend

      - name: Build AI service image
        run: docker build -t smart-university-ai-service ./ai-service
