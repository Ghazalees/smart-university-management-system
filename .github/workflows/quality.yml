name: Quality checks

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements/base.txt
            backend/requirements/development.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/development.txt

      - name: Run Django system checks
        working-directory: backend
        run: python manage.py check

      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Check backend formatting
        working-directory: backend
        run: ruff format --check .

      - name: Lint backend
        working-directory: backend
        run: ruff check .

      - name: Run backend tests with coverage
        working-directory: backend
        run: pytest -q --cov=apps --cov-report=term-missing --cov-fail-under=70

  ai-service-quality:
    name: AI service quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ai-service/requirements.txt
            ai-service/requirements-dev.txt

      - name: Install AI service dependencies
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run AI service tests
        working-directory: ai-service
        run: pytest -q

      - name: Check AI service formatting
        working-directory: ai-service
        run: ruff format --check .

      - name: Lint AI service
        working-directory: ai-service
        run: ruff check .

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-config:
    name: Docker configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate local Compose configuration
        run: docker compose config --quiet

      - name: Validate production Compose configuration
        env:
          BACKEND_IMAGE: smart-university/backend:ci
          FRONTEND_IMAGE: smart-university/frontend:ci
          AI_IMAGE: smart-university/ai-service:ci
          DJANGO_SECRET_KEY: ci-only-secret
          DJANGO_ALLOWED_HOSTS: example.test
          CORS_ALLOWED_ORIGINS: https://example.test
          AI_SERVICE_API_KEY: ci-only-ai-key
        run: docker compose -f docker-compose.prod.yml config --quiet
