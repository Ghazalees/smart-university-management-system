name: Smart University Full CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "integration/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: smart-university-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  changes:
    name: Detect Changed Components
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai_service: ${{ steps.filter.outputs.ai_service }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            ai_service:
              - 'ai-service/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
            infrastructure:
              - 'docker-compose.yml'
              - 'nginx/**'

  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements/*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black isort flake8 pytest pytest-django coverage

      - name: Check formatting
        run: |
          black --check .
          isort --check-only .

      - name: Run lint
        run: flake8 .

      - name: Run Django checks
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: |
          coverage run -m pytest
          coverage xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  ai_service:
    name: AI Service Tests & Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ai_service == 'true'

    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black isort flake8 pytest coverage

      - name: Check formatting
        run: |
          black --check .
          isort --check-only .

      - name: Run lint
        run: flake8 .

      - name: Run tests
        run: |
          coverage run -m pytest
          coverage xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ai-coverage
          path: ai-service/coverage.xml

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build

  docker:
    name: Build and Publish Changed Images
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend
      - ai_service
      - frontend

    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.changes.result == 'success' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.ai_service.result == 'success' || needs.ai_service.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI service
        if: needs.changes.outputs.ai_service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          tags: ghcr.io/${{ github.repository }}/ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && needs.docker.result == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            cd /apps/smart-university/
            docker compose pull
            docker compose up -d