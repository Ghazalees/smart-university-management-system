name: Smart University Full CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: smart-university-pipeline
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

####################################################
# BACKEND TEST / LINT
####################################################
jobs:

  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: backend-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black isort flake8 pytest pytest-django coverage

      - name: Check code formatting
        run: |
          black --check .
          isort --check-only .

      - name: Lint backend
        run: flake8 .

      - name: Run backend tests with coverage
        run: |
          coverage run -m pytest
          coverage xml

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml


####################################################
# FRONTEND TEST / LINT
####################################################

  frontend:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Run frontend tests
        env:
          CI: true
        run: npm test -- --watchAll=false


####################################################
# AI SERVICE TEST / LINT
####################################################

  ai_service:
    name: AI Service Tests & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ai-${{ hashFiles('ai-service/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black isort flake8 pytest coverage

      - name: Check formatting
        run: |
          black --check .
          isort --check-only .

      - name: Lint AI service
        run: flake8 .

      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage xml

      - name: Upload AI coverage
        uses: actions/upload-artifact@v4
        with:
          name: ai-coverage
          path: ai-service/coverage.xml


####################################################
# DOCKER BUILD & PUSH
####################################################

  docker:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    needs: [backend, frontend, ai_service]

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ghcr.io/${{ github.repository }}/ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


####################################################
# DEPLOY TO VPS
####################################################

  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    needs: [docker]

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            cd /apps/smart-university/
            docker compose pull
            docker compose up -d
