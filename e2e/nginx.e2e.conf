user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format structured escape=json '{"time":"$time_iso8601","request_id":"$correlation_id","remote_addr":"$remote_addr","method":"$request_method","uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,"duration":$request_time}';
    access_log /var/log/nginx/access.log structured;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 5m;
    server_tokens off;

    map $http_x_request_id $correlation_id {
        default $http_x_request_id;
        "" $request_id;
    }

    # Browser automation generates short request bursts; production limits remain unchanged.
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=500r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=3000r/m;

    include /etc/nginx/conf.d/*.conf;
}
