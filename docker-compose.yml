# Orchestrates the backend, frontend, AI service, gateway, storage, and private network.

name: smart-university

services:
  backend:
    build:
      context: ./backend
    image: smart-university/backend:local
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-development-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SQLITE_DB_PATH: /app/data/db.sqlite3
      AI_SERVICE_URL: http://ai-service:9000
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-local-ai-internal-key}
      AI_RETRIEVAL_STRATEGY: ${AI_RETRIEVAL_STRATEGY:-hybrid}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-1}
      AUTO_SEED_SYSTEM: ${AUTO_SEED_SYSTEM:-1}
      AUTO_SEED_DEMO: ${AUTO_SEED_DEMO:-1}
    volumes:
      - backend-data:/app/data
    expose:
      - "8000"
    depends_on:
      ai-service:
        condition: service_healthy
    restart: unless-stopped
    networks: [private]

  frontend:
    build:
      context: ./frontend
    image: smart-university/frontend:local
    expose:
      - "8080"
    restart: unless-stopped
    networks: [private]

  ai-service:
    build:
      context: ./ai-service
    image: smart-university/ai-service:local
    environment:
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-local-ai-internal-key}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      AI_DISABLE_DOCS: ${AI_DISABLE_DOCS:-0}
    expose:
      - "9000"
    restart: unless-stopped
    networks: [private]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks: [private]

volumes:
  backend-data:

networks:
  private:
    driver: bridge
