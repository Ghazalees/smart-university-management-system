version: "3.9"

services:
  backend:
    build: ./backend
    container_name: su-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - ai-service
    restart: always

  frontend:
    build: ./frontend
    container_name: su-frontend
    ports:
      - "3000:80"
    restart: always

  ai-service:
    build: ./ai-service
    container_name: su-ai
    ports:
      - "9000:9000"
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: su-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - ai-service
    restart: always
